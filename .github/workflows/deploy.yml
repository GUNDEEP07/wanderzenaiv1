name: Deploy WanderZenAI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-southeast-2
  STACK_NAME: wanderzenai-prod

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint --if-present

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    outputs:
      api-url: ${{ steps.get-outputs.outputs.api-url }}
      cloudfront-url: ${{ steps.get-outputs.outputs.cloudfront-url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Setup Node.js for Lambda deps
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install shared layer dependencies
        working-directory: backend/layers/shared/nodejs
        run: npm ci

      - name: Install function dependencies
        run: |
          for dir in backend/functions/*/; do
            if [ -f "$dir/package.json" ]; then
              echo "Installing deps for $dir"
              cd "$dir" && npm ci && cd -
            fi
          done

      - name: SAM build
        working-directory: infra
        run: sam build --template template.yaml

      - name: SAM deploy
        working-directory: infra
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_SINGLE_PLAN_LINK: ${{ secrets.STRIPE_SINGLE_PLAN_LINK }}
          STRIPE_WANDERER_LINK: ${{ secrets.STRIPE_WANDERER_LINK }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        run: |
          sam deploy \
            --stack-name ${{ env.STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --parameter-overrides \
              "Stage=prod" \
              "DBHost=${DB_HOST}" \
              "DBName=${DB_NAME}" \
              "DBUser=${DB_USER}" \
              "DBPassword=${DB_PASSWORD}" \
              "ClaudeApiKey=${CLAUDE_API_KEY}" \
              "FromEmail=${FROM_EMAIL}" \
              "StripeSecretKey=${STRIPE_SECRET_KEY}" \
              "StripeWebhookSecret=${STRIPE_WEBHOOK_SECRET}" \
              "StripeSinglePlanLink=${STRIPE_SINGLE_PLAN_LINK}" \
              "StripeWandererLink=${STRIPE_WANDERER_LINK}" \
              "FrontendUrl=${FRONTEND_URL}" \
              "FoursquareApiKey=${FOURSQUARE_API_KEY:-placeholder}" \
              "OpenTripMapApiKey=${OPENTRIPMAP_API_KEY:-placeholder}"

      - name: Get stack outputs
        id: get-outputs
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text --region ${{ env.AWS_REGION }})
          CF_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontUrl'].OutputValue" \
            --output text --region ${{ env.AWS_REGION }})
          echo "api-url=$API_URL" >> $GITHUB_OUTPUT
          echo "cloudfront-url=$CF_URL" >> $GITHUB_OUTPUT
          echo "API URL: $API_URL"
          echo "CloudFront URL: $CF_URL"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React app
        working-directory: frontend
        env:
          VITE_API_URL: ${{ needs.deploy-backend.outputs.api-url }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          VITE_STRIPE_SINGLE_PLAN_LINK: ${{ secrets.STRIPE_SINGLE_PLAN_LINK }}
          VITE_STRIPE_WANDERER_LINK: ${{ secrets.STRIPE_WANDERER_LINK }}
        run: npm run build

      - name: Get S3 bucket name
        id: get-bucket
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text --region ${{ env.AWS_REGION }} 2>/dev/null || echo "")
          if [ -z "$BUCKET" ] || [ "$BUCKET" = "None" ]; then
            BUCKET="${{ secrets.FRONTEND_BUCKET }}"
          fi
          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT
          echo "Using bucket: $BUCKET"

      - name: Sync to S3
        working-directory: frontend
        run: |
          aws s3 sync dist/ s3://${{ steps.get-bucket.outputs.bucket }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp dist/index.html s3://${{ steps.get-bucket.outputs.bucket }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E329HHUPH0JQTP \
            --paths "/*"
          echo "Cache invalidated"

      - name: Deployment summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.deploy-backend.outputs.cloudfront-url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API | ${{ needs.deploy-backend.outputs.api-url }} |" >> $GITHUB_STEP_SUMMARY

  preview:
    name: PR Preview Check
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install and build
        working-directory: frontend
        env:
          VITE_API_URL: https://preview.wanderzenai.com
        run: |
          npm ci
          npm run build
          echo "Build succeeded"
